services:

  web:

    build: .

    container_name: web-server

    ports:
      - "8080:80"

    volumes:
      - .:/var/www/html/

    networks:
      - cicd-net



  db:

    image: mysql:8.0

    container_name: db-server

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: "mydb"

    ports:
      - "3306:3306"

    networks:
      - cicd-net



  phpmyadmin:

    image: phpmyadmin/phpmyadmin

    container_name: phpmyadmin

    restart: always

    ports:
      - "8000:80"

    environment:
      PMA_HOST: db
      PMA_PORT: 3306

    networks:
      - cicd-net



networks:

  cicd-net:

    driver: bridge
    